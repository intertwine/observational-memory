name: Dependency Review

on:
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "poetry.lock"
      - "requirements*.txt"
      - ".github/workflows/**" # GitHub tracks Actions in the dependency graph.

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest

    steps:
      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

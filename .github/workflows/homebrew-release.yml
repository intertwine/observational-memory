name: Homebrew Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  update-tap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Check formula name availability in Homebrew/core
        run: |
          FORMULA_NAME="observational-memory"
          if curl -fsSL "https://formulae.brew.sh/api/formula/${FORMULA_NAME}.json" >/dev/null 2>&1; then
            echo "Formula name '${FORMULA_NAME}' already exists in Homebrew/core. Choose a different formula name."
            exit 1
          fi

      - name: Validate Homebrew tap configuration
        env:
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_REPO" ]; then
            echo "Missing repository variable HOMEBREW_TAP_REPO (example: intertwine/homebrew-tap)"
            exit 1
          fi
          if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "Missing secret HOMEBREW_TAP_GITHUB_TOKEN with push access to $HOMEBREW_TAP_REPO"
            exit 1
          fi

      - name: Read package version
        id: pkg_version
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="${{ steps.pkg_version.outputs.version }}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject version ($PKG_VERSION)"
            exit 1
          fi

      - name: Generate Homebrew formula
        run: uv run --with pip python scripts/generate_homebrew_formula.py --output packaging/homebrew/observational-memory.rb

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula in tap repo
        run: |
          mkdir -p homebrew-tap/Formula
          cp packaging/homebrew/observational-memory.rb homebrew-tap/Formula/observational-memory.rb

      - name: Commit and push formula update
        env:
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
        run: |
          cd homebrew-tap
          if git diff --quiet -- Formula/observational-memory.rb; then
            echo "No formula changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/observational-memory.rb
          git commit -m "observational-memory ${{ steps.pkg_version.outputs.version }}"
          git push

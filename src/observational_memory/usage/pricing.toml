# Observational Memory — model pricing snapshot
#
# Prices are USD per 1,000,000 tokens (input / output), the unit every major
# provider quotes. This is a DATED SNAPSHOT and is intentionally easy to PR:
# bump `snapshot_date` to the newest refreshed row date when a provider changes
# prices.
#
# These figures are approximate published list prices as of the snapshot date
# and may not match your negotiated/enterprise rate. Override per host with a
# `pricing.toml` at $OM_PRICING_OVERRIDES (default:
# ~/.config/observational-memory/pricing.toml) — override entries win.
#
# Unknown models (no entry here or in your override) record token counts with
# `pricing=unknown` and skip USD estimation.
#
# Subscription-backed providers (openai-chatgpt, xai-oauth) always record
# $0.00 marginal cost regardless of this table.

snapshot_date = "2026-05-28"

[models]
# Anthropic
"claude-opus-4-7" = { input = 15.00, output = 75.00 }
"claude-sonnet-4-5" = { input = 3.00, output = 15.00 }
"claude-sonnet-4-6" = { input = 3.00, output = 15.00 }
"claude-haiku-4-5" = { input = 1.00, output = 5.00 }

# OpenAI
"gpt-5.5" = { input = 1.25, output = 10.00 }
"gpt-5" = { input = 1.25, output = 10.00 }
"gpt-4o" = { input = 2.50, output = 10.00 }
"gpt-4o-mini" = { input = 0.15, output = 0.60 }
"o3" = { input = 2.00, output = 8.00 }
"o4-mini" = { input = 1.10, output = 4.40 }

# xAI
# Source: https://docs.x.ai/developers/models/grok-4.3
"grok-4.3" = { input = 1.25, output = 2.50 }
"grok-4" = { input = 3.00, output = 15.00 }
"grok-code-fast-1" = { input = 0.20, output = 1.50 }
